

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Flip Card</title>
    <style>
       body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
}

.flip-card-container {
    display: flex;
    gap: 20px;
}

.flip-card {
    perspective: 1000px;
    width: 180px;
    height: 200px;
}

.flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.9s;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
}

.flip-card:hover .flip-card-inner {
    transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: black;
}

.flip-card-front {
    background-color: #ae2e2d; 
    border: 5px solid #cb9a52;
}

.flip-card-front img {
    width: 100%;
    height: 100%;
    object-fit: fill; 
}

.flip-card-back {
    background-color: #cb9a52;
    transform: rotateY(180deg);
    padding: 20px;
}

a{
    color: black;
    text-decoration: none;
}

    </style>
</head>
<body>

<div class="flip-card-container">
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="Syllabus icon.png" alt="Syllabus Icon">
            </div>
            <div class="flip-card-back">
                <a href="https://collms.dpuerp.in/content/enforced/6826-OBC101-July24/OBC101_July24_syllabus.pdf" target="_blank">Here is the Syllabus.</a>
            </div>
        </div>
    </div>
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="Online Session icon.png" alt="Online Session Icon">
            </div>
            <div class="flip-card-back">
                <a href="https://collms.dpuerp.in/content/enforced/6826-OBC101-July24/OBC101_July24_syllabus.pdf" target="_blank">Here is the Online Session.</a>
            </div>
        </div>
    </div>
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="Online Session Schedule icon.png" alt="Online Session Schedule Icon">
            </div>
            <div class="flip-card-back">
                <a href="https://collms.dpuerp.in/content/enforced/6826-OBC101-July24/OBC101_July24_syllabus.pdf" target="_blank">Here is the Online Session Schedule.</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
