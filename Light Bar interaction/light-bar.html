<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light bar</title>
    <style>
        :root {
            --background: #cecece;
            --scale: 1;
            --icon-size: 125px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        nav {
            position: relative;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: space-between; /* Distribute items evenly */
            align-items: center;
            border-radius: 10px;
            padding: 0 15px;
            background: #ae2e2d;
            box-shadow: 0 6.7px 5.3px rgba(0, 0, 0, 0.12), 0 22.3px 17.9px rgba(0, 0, 0, 0.08), 0 100px 80px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        nav ul {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex: 1;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        nav li {
            width: var(--icon-size);
            height: var(--icon-size);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav a {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: transparent;
            border: none;
        }

        nav img {
            width: 170px;
            height: 170px; /* Maintain aspect ratio */
            max-height: 100%;
            opacity: 0.4;
            transition: opacity 200ms ease, transform 200ms ease;
        }

        nav a:hover img {
            opacity: 1; /* Set opacity to 100% on hover */
        }

        .tubelight {
            position: absolute;
            width: 150px;
            height: 5px;
            border-radius: 5px;
            background: #ffffff;
            transition: left 50ms ease;
            z-index: 10;
            top: 0; /* Adjust to align with the top of the images */
        }

        .light-ray {
            position: absolute;
            left: -30%;
            top: 5px;
            width: 160%;
            height: 100px;
            clip-path: polygon(5% 100%, 25% 0px, 75% 0px, 95% 100%);
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3) -50%, rgba(255, 255, 255, 0) 90%);
            pointer-events: none;
        }

    </style>
</head>
<body>
    <nav>
        <ul>
            <li>
                <a class="active">
                    <img src="Syllabus icon.png" alt="Syllabus">
                </a>
            </li>
        </ul>
        <ul>
            <li>
                <a>
                    <img src="Online Session Schedule icon.png" alt="Online Session Schedule">
                </a>
            </li>
        </ul>
        <ul>
            <li>
                <a>
                    <img src="Online Session icon.png" alt="Online Session">
                </a>
            </li>
        </ul>
        <ul>
            <li>
                <a>
                    <img style="width: 100px; height: 100px; transform: translateY(10%);" src="whatsapp.png" alt="WhatsApp">
                </a>
            </li>
        </ul>
        <div class="tubelight">
            <div class="light-ray"></div>
        </div>
    </nav>

    <script>
        console.clear();

        const uls = document.querySelectorAll("nav ul");
        const links = [...document.querySelectorAll("nav a")];
        const light = document.querySelector("nav .tubelight");

        let activeIndex = 0;
        let currentIndex = 0;
        let increment = 1;

        links.forEach((link, index) => {
            if (links[index].classList.contains("active")) {
                light.style.left = `${links[index].offsetLeft + links[index].offsetWidth / 2 - light.offsetWidth / 2}px`;
            }

            link.addEventListener("click", e => {
                activeIndex = index;
                let t = setInterval(() => {
                    if (activeIndex > currentIndex) increment = 1;
                    else if (activeIndex < currentIndex) increment = -1;
                    currentIndex += increment;

                    links[currentIndex].classList.add("active");
                    if (currentIndex != -1) links[currentIndex - increment].classList.remove("active");

                    if (currentIndex == activeIndex) {
                        e.target.classList.add("active");
                        increment = 0;
                        clearInterval(t);
                    }
                }, 50);
                light.style.left = `${e.target.offsetLeft + e.target.offsetWidth / 2 - light.offsetWidth / 2}px`;
            });
        });

        // Function to move the tubelight with the cursor
        function moveLight(e) {
            const navRect = e.currentTarget.getBoundingClientRect();
            const mouseX = e.clientX - navRect.left; // Get the mouse's X position relative to the navbar

            // Update the tubelight's position based on the cursor's position
            light.style.left = `${mouseX - light.offsetWidth / 2}px`;
        }

        // Attach the event listener to the entire navbar
        document.querySelector("nav").addEventListener("mousemove", moveLight);
    </script>

</body>
</html>
